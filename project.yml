name: AlphaBeta
options:
  bundleIdPrefix: com.JohnHoedeman
  deploymentTarget:
    iOS: "18.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO

targets:
  AlphaBeta:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
      - path: Content
      - path: UserData
      - path: Features
      - path: Theme
      - path: Support
    resources:
      - path: Content/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.JohnHoedeman.AlphaBeta
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        DEVELOPMENT_ASSET_PATHS: ""
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: App/AlphaBeta.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.JohnHoedeman.AlphaBeta
        com.apple.developer.icloud-services:
          - CloudKit
        aps-environment: development
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification

  AlphaBetaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: AlphaBetaTests
    dependencies:
      - target: AlphaBeta
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  AlphaBeta:
    build:
      targets:
        AlphaBeta: all
        AlphaBetaTests: [test]
    test:
      targets:
        - AlphaBetaTests
